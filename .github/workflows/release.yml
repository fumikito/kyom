name: Kyom Theme Workflow

# Release Drafterのドラフトを公開するとタグが作成され、このワークフローが起動する。
# ビルド済みテーマのZIPを公開済みリリースに添付する。
on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  tags-check:
    name: Check Branch for Tag
    uses: tarosky/workflows/.github/workflows/check-tag-in-branch.yml@main
    if: contains(github.ref, 'refs/tags/')
    with:
      allowed_branch: "master"

  release:
    name: Build Theme
    needs: tags-check
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://github.com/fumikito/kyom/releases
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP with composer v2
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install NPM
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build package.
        run: bash bin/build.sh ${{ github.ref }}

      - name: Create Zip
        run: zip -r ${{ github.event.repository.name }}.zip ./

      - name: Upload Release Zip
        run: gh release upload ${{ github.event.release.tag_name }} ${{ github.event.repository.name }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
